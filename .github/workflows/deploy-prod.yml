# Деплой prod: job выполняется НА VPS (self-hosted runner).
# Jino блокирует inbound SSH и HTTPS с IP GitHub — runner ходит к GitHub сам.
#
# Настройка: deploy/setup-github-runner.sh
# Запасной вариант без runner: cron deploy/cron-git-autodeploy.sh (каждые 5 мин)

name: Deploy production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, delayu]
    steps:
      - name: Pull and deploy on server
        run: |
          set -euo pipefail
          sudo -n bash /opt/delayu/deploy/run-deploy.sh
