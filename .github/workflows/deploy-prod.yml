# Деплой на prod по push в main.
# Jino блокирует SSH с IP GitHub → триггер через HTTPS webhook на сайт.
#
# Secrets:
#   DEPLOY_URL            https://delau.tech
#   DEPLOY_WEBHOOK_TOKEN  тот же, что DEPLOY_WEBHOOK_TOKEN в /opt/delayu/.env

name: Deploy production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_URL:-}" || -z "${DEPLOY_WEBHOOK_TOKEN:-}" ]]; then
            echo "Missing DEPLOY_URL or DEPLOY_WEBHOOK_TOKEN secrets"
            exit 1
          fi
          BASE="${DEPLOY_URL%/}"
          curl -fsS -X POST "${BASE}/internal/deploy/" \
            -H "Authorization: Bearer ${DEPLOY_WEBHOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            --max-time 60
          echo "Deploy webhook accepted (runs on server in background)"
