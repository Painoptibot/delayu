# Деплой на VPS по push в main.
#
# Settings → Secrets and variables → Actions (имена ТОЧНО так):
#   DEPLOY_HOST      dab7798018f1.vps.myjino.ru
#   DEPLOY_USER      root
#   DEPLOY_PATH      /opt/delayu
#   DEPLOY_PASSWORD  пароль root
#
# НЕ добавляйте DEPLOY_SSH_KEY, если входите по паролю.

name: Deploy production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd "/opt/delayu"
            sudo -u delayu git pull --ff-only
            sudo bash deploy/update-prod.sh
