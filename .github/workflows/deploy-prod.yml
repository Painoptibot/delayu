# Деплой на VPS по push в main.
#
# Secrets:
#   DEPLOY_HOST, DEPLOY_USER (root)
#   DEPLOY_SSH_KEY — приватный ключ (см. deploy/setup-github-actions-ssh.sh)
#   DEPLOY_SSH_KEY_B64 — тот же ключ в base64 (если многострочная вставка ломается)

name: Deploy production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          KEY=~/.ssh/deploy_key

          if [[ -n "${DEPLOY_SSH_KEY_B64:-}" ]]; then
            echo "${DEPLOY_SSH_KEY_B64}" | base64 -d > "${KEY}"
          elif [[ -n "${DEPLOY_SSH_KEY:-}" ]]; then
            printf '%s\n' "${DEPLOY_SSH_KEY}" | tr -d '\r' > "${KEY}"
          else
            echo "Missing DEPLOY_SSH_KEY or DEPLOY_SSH_KEY_B64"
            exit 1
          fi
          chmod 600 "${KEY}"

          echo "Key fingerprint (must match VPS setup script):"
          ssh-keygen -lf "${KEY}"

          ssh -i "${KEY}" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" << 'REMOTE'
          set -euo pipefail
          cd /opt/delayu
          sudo -u delayu git config --global --add safe.directory /opt/delayu
          sudo -u delayu git pull --ff-only origin main
          bash /opt/delayu/deploy/deploy-app.sh
          sudo -u delayu bash -c 'cd /opt/delayu && .venv/bin/python manage.py link_superusers'
          systemctl is-active delayu
          REMOTE
