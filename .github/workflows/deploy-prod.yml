# Деплой на VPS по push в main.
#
# Secrets (Settings → Actions):
#   DEPLOY_HOST       dab7798018f1.vps.myjino.ru
#   DEPLOY_USER       root
#   DEPLOY_SSH_KEY    приватный ключ (рекомендуется, см. docs/deploy-github-actions.md)
#   DEPLOY_PASSWORD   пароль root (если без ключа)

name: Deploy production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /opt/delayu
            sudo -u delayu git config --global --add safe.directory /opt/delayu
            sudo -u delayu git pull --ff-only origin main
            bash /opt/delayu/deploy/deploy-app.sh
            sudo -u delayu bash -c 'cd /opt/delayu && .venv/bin/python manage.py link_superusers'
            systemctl is-active delayu
