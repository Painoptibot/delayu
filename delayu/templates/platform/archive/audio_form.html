{% extends layout_path %}
{% block title %}{{ page_title }} — ДелаЮ{% endblock %}
{% block content %}
<h4 class="mb-4">{{ page_title }}</h4>
<div class="card col-lg-8"><div class="card-body">
  <form method="post" enctype="multipart/form-data">{% csrf_token %}
    {% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}</div>{% endfor %}
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'platform-audio' %}" class="btn btn-outline-secondary">Отмена</a>
  </form>
</div></div>
{% endblock %}
