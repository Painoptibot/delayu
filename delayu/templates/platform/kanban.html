{% extends layout_path %}
{% block title %}Канбан{% endblock %}
{% block content %}
<div class="d-flex gap-3 overflow-auto pb-4">
{% for col in column_data %}
<div class="border rounded p-3" style="min-width:260px">
  <h6 class="mb-3">{{ col.label }}</h6>
  {% for t in col.tasks %}
  <div class="card mb-2"><div class="card-body p-3">
    <div class="fw-medium">{{ t.title }}</div>
    <form method="post" action="{% url 'platform-kanban-move' t.pk %}" class="mt-2">{% csrf_token %}
      <select name="column" class="form-select form-select-sm" onchange="this.form.submit()">
        {% for c in column_data %}<option value="{{ c.code }}" {% if t.kanban_column == c.code %}selected{% endif %}>{{ c.label }}</option>{% endfor %}
      </select>
    </form>
  </div></div>
  {% empty %}<p class="text-muted small">Пусто</p>{% endfor %}
</div>
{% endfor %}
</div>
{% endblock %}
