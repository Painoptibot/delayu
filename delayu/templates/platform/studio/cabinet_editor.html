{% extends "platform/studio/_base.html" %}
{% block studio_content %}
<div class="card" data-studio="cabinet" data-save-url="{% url 'platform-studio-save' 'cabinet' %}">
  <div class="card-header"><h5 class="mb-0">Раскладка личного кабинета</h5></div>
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-4">
        <p class="small text-muted">Виджеты</p>
        <div id="studioCabPalette" class="studio-palette"></div>
        <script type="application/json" id="studioCabCatalog">{{ catalog_json|safe }}</script>
      </div>
      <div class="col-md-8">
        <div id="studioCabCanvas" class="studio-canvas border rounded p-3 min-h-200"></div>
        <script type="application/json" id="studioCabJson">{{ widgets_json|safe }}</script>
        <div class="text-end mt-3"><button type="button" class="btn btn-primary" id="studioCabSave">Сохранить кабинет</button></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
