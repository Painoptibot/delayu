{% extends "platform/studio/_base.html" %}
{% block studio_content %}
<div class="card" data-studio="dashboard" data-save-url="{% url 'platform-studio-save' 'dashboard' %}">
  <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-2">
    <h5 class="mb-0">Конструктор дашборда</h5>
    {% if roles %}
    <form method="get" class="d-flex align-items-center gap-2">
      <label class="small text-muted mb-0" for="studioDashRole">Шаблон для роли</label>
      <select id="studioDashRole" name="role" class="form-select form-select-sm" onchange="this.form.submit()">
        {% for r in roles %}
        <option value="{{ r.pk }}"{% if active_role.pk == r.pk %} selected{% endif %}>{{ r.name }}</option>
        {% endfor %}
      </select>
    </form>
    {% endif %}
  </div>
  <div class="card-body">
    <p class="small text-muted">Раскладка KPI и графиков для выбранной роли. Личные настройки пользователя имеют приоритет, если заданы.</p>
    <div class="row g-3">
      <div class="col-md-4">
        <p class="small text-muted">Виджеты</p>
        <div id="studioDashPalette" class="studio-palette"></div>
        <script type="application/json" id="studioDashCatalog">{{ catalog_json|safe }}</script>
      </div>
      <div class="col-md-8">
        <div id="studioDashCanvas" class="studio-dash-grid border rounded p-3"></div>
        <script type="application/json" id="studioDashJson">{{ widgets_json|safe }}</script>
        <input type="hidden" id="studioDashRoleId" value="{{ active_role.pk|default:'' }}" />
        <div class="text-end mt-3"><button type="button" class="btn btn-primary" id="studioDashSave">Сохранить шаблон роли</button></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
