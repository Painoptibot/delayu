{% extends "platform/studio/_base.html" %}
{% block studio_content %}
<div class="card" data-studio="correspondence" data-save-url="{% url 'platform-studio-save' 'correspondence' %}">
  <div class="card-header"><h5 class="mb-0">Маршрут корреспонденции (СЭД)</h5></div>
  <div class="card-body">
    <p class="text-muted small">Перетащите этапы в нужном порядке. Укажите SLA (дней) для каждого этапа.</p>
    <div class="row g-3">
      <div class="col-md-4">
        <div id="studioCorrPalette" class="studio-palette">
          {% for s in step_catalog %}
          <div class="studio-palette-item" draggable="true" data-step-id="{{ s.id }}">
            <i class="ri {{ s.icon }} me-2"></i>{{ s.label }}
          </div>
          {% endfor %}
        </div>
      </div>
      <div class="col-md-8">
        <ol id="studioCorrCanvas" class="studio-corr-steps list-group list-group-numbered"></ol>
        <script type="application/json" id="studioCorrJson">{{ workflow_json|safe }}</script>
        <div class="text-end mt-3"><button type="button" class="btn btn-primary" id="studioCorrSave">Сохранить маршрут</button></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
