{% extends layout_path %}
{% block title %}{{ page_title }} — ДелаЮ{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header"><h5 class="mb-0">{{ page_title }}</h5></div>
  <div class="card-body">
    <form method="post">{% csrf_token %}
      {% for field in form %}
      <div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}</div>
      {% endfor %}
      <button type="submit" class="btn btn-primary">Сохранить</button>
      <a href="{% url 'platform-registries' %}" class="btn btn-outline-secondary">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
