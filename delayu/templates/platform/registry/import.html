{% extends layout_path %}
{% block title %}{{ page_title }} — ДелаЮ{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header d-flex justify-content-between">
    <h5 class="mb-0">{{ page_title }}</h5>
    <a href="{% url 'platform-registry-records' registry_type.pk %}" class="btn btn-sm btn-outline-secondary">К записям</a>
  </div>
  <div class="card-body">
    <p class="small text-muted">Поля: {% for f in registry_type.field_schema %}<code>{{ f.key }}</code>{% if not forloop.last %}, {% endif %}{% endfor %}</p>
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label class="form-label">{{ form.payload.label }}</label>{{ form.payload }}</div>
      <button type="submit" class="btn btn-primary">Импортировать</button>
    </form>
  </div>
</div>
{% endblock %}
