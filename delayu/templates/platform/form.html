{% extends layout_path %}
{% block title %}{{ page_title|default:"Форма" }} — ДелаЮ{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header"><h5 class="mb-0">{{ page_title|default:"Форма" }}</h5></div>
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-4">
        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary">Сохранить</button>
      <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
