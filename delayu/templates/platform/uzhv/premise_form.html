{% extends layout_path %}
{% block title %}Помещение {{ premise.number }}{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">{{ building.address }}, кв. {{ premise.number }}</h5>
    <a href="{% url 'uzhv-building-detail' building.pk %}" class="btn btn-sm btn-outline-secondary">← МКД</a>
  </div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {% include "platform/uzhv/_form_fields.html" with form=form %}
      <div class="mt-3">
        <button type="submit" class="btn btn-primary">Сохранить</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
