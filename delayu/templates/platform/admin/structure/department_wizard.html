{% extends layout_path %}
{% block title %}Новое подразделение{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header d-flex justify-content-between">
    <h5 class="mb-0">Подразделение — {{ organization.name }}</h5>
    <a href="{% url 'platform-structure' %}?org={{ organization.pk }}" class="btn btn-sm btn-outline-secondary">Назад</a>
  </div>
  <div class="card-body">
    <form method="post">{% csrf_token %}
      <input type="hidden" name="organization" value="{{ organization.pk }}">
      <div class="row g-3">
        {% for field in form %}
        <div class="col-md-6">
          <label class="form-label">{{ field.label }}</label>{{ field }}
          {% for e in field.errors %}<div class="text-danger small">{{ e }}</div>{% endfor %}
        </div>
        {% endfor %}
      </div>
      <button type="submit" class="btn btn-primary mt-4">Создать</button>
    </form>
  </div>
</div>
{% endblock %}
