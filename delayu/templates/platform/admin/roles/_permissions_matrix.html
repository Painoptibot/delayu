<div class="table-responsive" style="max-height:420px;overflow:auto">
  <table class="table table-sm table-bordered align-middle mb-0">
    <thead class="table-light sticky-top">
      <tr>
        <th>Модуль</th>
        <th class="text-center small">Просмотр</th>
        <th class="text-center small">Создание</th>
        <th class="text-center small">Изменение</th>
        <th class="text-center small">Удаление</th>
      </tr>
    </thead>
    <tbody>
      {% for row in matrix_rows %}
      <tr>
        <td class="small"><strong>{{ row.mod.code }}</strong><br><span class="text-muted">{{ row.mod.name }}</span></td>
        {% for cell in row.cells %}
        <td class="text-center">{{ cell.field }}</td>
        {% endfor %}
      </tr>
      {% empty %}
      <tr><td colspan="5" class="text-muted text-center">Нет включённых модулей в подсистеме (M01)</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
